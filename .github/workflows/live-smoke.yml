name: Live Gateway Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  live-gateway:
    runs-on: ubuntu-latest
    if: ${{ secrets.MODEIO_GATEWAY_UPSTREAM_API_KEY != '' || secrets.OPENAI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run live gateway smoke
        env:
          MODEIO_GATEWAY_UPSTREAM_API_KEY: ${{ secrets.MODEIO_GATEWAY_UPSTREAM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEIO_GATEWAY_UPSTREAM_BASE_URL: ${{ vars.MODEIO_GATEWAY_UPSTREAM_BASE_URL }}
          MODEIO_GATEWAY_UPSTREAM_MODEL: ${{ vars.MODEIO_GATEWAY_UPSTREAM_MODEL }}
        run: bash ./scripts/smoke_e2e.sh --live --artifacts-dir ./.artifacts/live-gateway-smoke
      - name: Upload live smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-gateway-smoke
          path: ./.artifacts/live-gateway-smoke
          if-no-files-found: ignore
